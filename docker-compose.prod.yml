version: '3.8'
services:
  cockroachdb:
    image: cockroachdb/cockroach:latest-v23.1
    command: start-single-node --insecure --store=attrs=ram,path=/var/lib/cockroach/
    restart: always
    volumes:
      - data:/var/lib/cockroach
    expose:
      - "8080"
      - "26257"
    ports:
      - "26257:26257"
      - "8080:8080"

  nakama:
    image: heroiclabs/nakama:3.22.0
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address root@cockroachdb:26257 &&
        exec /nakama/nakama --name nakama1 --database.address root@cockroachdb:26257 --logger.level DEBUG --session.token_expiry_sec 7200 --metrics.prometheus_port 9100 --matchmaker.interval_sec 1
    restart: always
    links:
      - "cockroachdb:db"
    depends_on:
      - cockroachdb
    volumes:
      - ./backend/build:/nakama/data/modules/build
    ports:
      - "7348:7348"
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"

  # Frontend served via lightweight Nginx on port 3005
  frontend:
    build:
      context: ./frontend
      dockerfile: prod.Dockerfile
    restart: always
    ports:
      - "3005:80"

volumes:
  data:
